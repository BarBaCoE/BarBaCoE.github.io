<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="2048px" height="2048px" viewBox="0 0 2048 2048" style="enable-background:new 0 0 2048 2048;"
     xml:space="preserve">
<style type="text/css">
  .st0{fill:#FFFFFF;stroke:#000000;stroke-width:14;stroke-miterlimit:10;}
  .st1{fill:#EBA0C3;}
  .st2{fill:#E9CFD8;stroke:#000000;stroke-width:14;stroke-miterlimit:10;}
</style>

<!-- Handle: drawn first so it sits behind the body. A D-shape with an inner cutout. -->
<path class="st2" d="
  M1380,720
  C1740,720 1740,1340 1380,1340
  L1380,1220
  C1580,1220 1580,840 1380,840
  Z"/>

<!-- Pitcher body silhouette (outline + light blush fill, like the head/face of the original logo).
     Includes a pour spout at the top-left. -->
<path class="st2" d="
  M520,540
  Q520,460 600,460
  L640,460
  L700,360
  Q740,320 780,360
  L820,460
  L1340,460
  Q1420,460 1420,540
  L1420,1680
  Q1420,1760 1340,1760
  L600,1760
  Q520,1760 520,1680
  Z"/>

<!-- The beer: pink fill inside the body, slightly inset so the body outline remains visible.
     Uses class .st1 so the existing drain animation (clip-path on .st1) works automatically. -->
<path class="st1" d="
  M590,540
  L590,1680
  Q590,1690 600,1690
  L1340,1690
  Q1350,1690 1350,1680
  L1350,540
  Q1350,510 1320,510
  L820,510
  L780,420
  Q740,400 720,420
  L680,510
  L620,510
  Q590,510 590,540
  Z"/>

<!-- A bit of foam at the top of the beer. -->
<ellipse class="st0" cx="970" cy="540" rx="370" ry="34"/>

<!-- Cute character eyes (optional flourish, matches the original logo's vibe). -->
<ellipse class="st0" cx="820" cy="1080" rx="55" ry="95"/>
<ellipse class="st0" cx="1120" cy="1080" rx="55" ry="95"/>

<!-- Pupils -->
<ellipse cx="820" cy="1110" rx="22" ry="38" fill="#000000"/>
<ellipse cx="1120" cy="1110" rx="22" ry="38" fill="#000000"/>

<!-- Smile -->
<path d="M870,1280 Q970,1360 1070,1280" fill="none" stroke="#000000" stroke-width="14" stroke-linecap="round"/>
</svg>
